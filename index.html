<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="speech.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="leftCont">
            <div class="logo">
                <i class="fa-solid fa-microphone"></i>
            </div>
            <h1>TEXT TO SPEECH</h1>
            <p>VOICE CONVERT TO TEXT</p>
        </div>      
        
        <div class="rightCont">
            <div class="langagueDiv">
                <select class="langague">
                    <option value="en-US">ENGLISG(INDIA)</option>
                    <option value="en-INDIA">ENGLISH(US)</option>
                    <!-- <option value="hi-INDIA">HINDI</option>
                    <option value="bn-INDIA">BENGALI</option> -->
                </select>
            </div>
            <div class="textbar">
                <textarea class="text" placeholder="TEXT IS HERE..."></textarea>
                <div class="clearText">
                    <span class="clearBtn">CLEAR</span>
                    <div class="icons">
                        <i class="fa-solid fa-message"></i>
                        <i class="fa-brands fa-square-facebook"></i>
                        <i class="fa-brands fa-square-instagram"></i>
                        <i class="fa-brands fa-square-whatsapp"></i>
                        <i class="fa-brands fa-twitter"></i>
                    </div>
                </div>
            </div>
            <button class="micBtn">
                <i class="fa-solid fa-microphone"></i>
            </button>
        </div>
    </div>
</body>
<script src="speech.js"></script>
</html>
